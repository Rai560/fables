<script>

var CH=[
{id:"ch1",num:"Chapter 1",title:"健身教练概论",desc:"了解职业全貌:教练是什么、做什么、怎么发展。给学习一个方向感。",diff:1,st:"new",
secs:[
{id:"ch1s1",title:"1.1 健身教练到底是干嘛的",c:'<h2>1.1 健身教练到底是干嘛的</h2><p><b>一句话定义:</b>健身教练是"用科学方法,帮别人安全、有效地达成身体目标的人"。</p><h3>三个关键词拆解</h3><ul><li><b>科学</b> - 基于解剖学、生理学原理来指导,不是凭感觉跟风网红。后续每章都在给"科学"填弹药。</li><li><b>安全</b> - 不受伤是底线。好教练首先让会员"不出事",其次才是"练出效果"。</li><li><b>有效</b> - 真能帮人达成目标(减脂/增肌/体态/运动表现),而非陪练半年没变化。</li></ul><h3>教练 vs 容易混淆的角色</h3><ul><li><b>陪练</b>:只陪你练、数数,不负责评估和计划。</li><li><b>健身博主</b>:做内容涨粉,但不对你个人身体情况负责。</li><li><b>万能保姆</b>:什么都答应,没有专业边界。</li></ul><p>教练核心竞争力 = <b>专业判断力</b>:根据眼前这个人的身体状况,做出"该练什么、不该练什么、先练什么后练什么"的决策。</p><div class="tip">联系你自己:你练了一年多,遇到过"这动作该不该做""重量加到多少"的困惑。以前靠刷视频+试错,教练靠系统知识框架回答。学完这套,你就不再靠运气摸索了。</div>'},
{id:"ch1s2",title:"1.2 健身教练分几种",c:'<h2>1.2 健身教练分几种</h2><ol><li><b>私人教练 PT (Personal Trainer)</b><br>一对一或小团,量身定制,按课时收费。你的<b>主战场</b>。</li><li><b>团操教练 GX (Group Exercise)</b><br>带团课:动感单车、搏击操、瑜伽、HIIT(高强度间歇训练)。<span style="color:var(--ac)">你之前上过 RPM,带课的就是 GX。</span></li><li><b>体能教练 (S&C, Strength & Conditioning)</b> - 服务运动员/队,需 NSCA-CSCS 等专证。</li><li><b>康复/功能性训练师</b> - 伤病恢复、体态矫正,需运动医学知识。</li><li><b>线上教练</b> - 远程写计划,适合有口碑后扩展。</li></ol><h3>你的定位</h3><p>A(健身房)+D(副业)= <b>主攻 PT</b>。团课可作副线增加曝光(上完你的课 → 约私教)。</p><div class="tip">新国职考的就是 PT 方向:运动计划制定、体适能评估,直接对口。</div>'},
{id:"ch1s3",title:"1.3 私教完整工作流",c:'<h2>1.3 私教完整工作流程</h2><p>专业私教的工作是完整闭环:</p><ol><li><b>获客/咨询</b> - 了解目标、习惯、经历、伤病史。</li><li><b>体测评估</b> - 体成分、关节活动度、心肺、基础力量。(Ch5)</li><li><b>设定目标</b> - 评估+期望 → SMART 阶段目标。</li><li><b>制定计划</b> - 周频、动作、组数次数强度、渐进。(Ch6 核心)</li><li><b>带训执行</b> - 示范、纠正、控强度、保安全、鼓励。</li><li><b>跟踪调整</b> - 每4-6周重评,调整方案。</li><li><b>续课/转介绍</b> - 效果好 → 续费+推荐。增长飞轮。</li></ol><div class="wrn">关键认知:步骤 2-4(评估→目标→计划)占专业价值一大半。只会做第5步的是"陪练",被觉得不值钱。你把 2-4 学扎实,已超越大量同行。</div><h3>关于卖课</h3><p>教练需要会卖课(收入来源),但好的销售建立在<b>专业信任</b>上:评估准、计划清、效果见,会员自然续。</p>'},
{id:"ch1s4",title:"1.4 职业道德(考点)",c:'<h2>1.4 职业道德与素养</h2><p>考试"送分区",不难但真的会考。</p><h3>五大准则</h3><ol><li><b>安全第一</b> - 识别运动禁忌症(心血管/急性损伤/孕期等),该拒就拒。"不受伤"优先于"满意"。</li><li><b>诚信</b> - 不夸大效果、不推销不必要课时、不推违禁补剂。</li><li><b>隐私保护</b> - 会员体重/体脂/病史是隐私,未经同意不可用于营销。</li><li><b>专业形象</b> - 着装整洁、守时、保持好体态。</li><li><b>终身学习</b> - 运动科学在更新,持证后仍需进修。</li></ol><div class="tip">考试技巧:记住优先级 安全>诚信>隐私>形象>学习,"哪个行为违反道德"题按此排即可。</div>'},
{id:"ch1s5",title:"1.5 行业与发展路径",c:'<h2>1.5 行业现状与发展路径</h2><h3>趋势</h3><ul><li><b>需求涨:</b>健康意识+中产+"运动=生活方式" → 付费意愿增。</li><li><b>供给洗牌:</b>早期低门槛,现在持证化,有证vs无证差距拉大。</li><li><b>模式分化:</b>大型连锁 / 精品工作室 / 线上教练三路并行。</li></ul><h3>发展路线</h3><ol><li>实习教练 → 初级PT → 资深PT →</li><li>管理线(主管→经理→店长) / 专业线(专项深耕) / 创业线(工作室/线上IP)</li></ol><h3>收入</h3><p>底薪+课时提成+销售提成。核心:课时费x课时量=天花板。专业力定课时费,沟通力定课时量。</p><div class="tip">你走D(副业):拿证+种子客户+口碑,副业私教完全可行,不一定要先进健身房。</div>'},
{id:"ch1s6",title:"1.6 新国职怎么考",c:'<h2>1.6 新国职:考什么、怎么考</h2><h3>三大板块</h3><table><tr style="background:var(--ac);color:#fff"><th>板块</th><th>形式</th><th>及格线</th><th>备注</th></tr><tr><td><b>理论</b></td><td>机考~60分钟</td><td>60/100</td><td>单选+多选+判断</td></tr><tr><td><b>体能</b></td><td>现场实测</td><td>达标即可</td><td>不计分,但必须过→进实操</td></tr><tr><td><b>实操</b></td><td>现场考核</td><td>60/100</td><td>抗阻训练指导、动作示范纠正</td></tr></table><h3>给你打气</h3><ul><li><b>理论</b>:本hub搞定。题型不偏,理解+记忆。</li><li><b>体能</b>:俯卧撑、深蹲等,你练一年多,大概率轻松。</li><li><b>实操</b>:你会练,学了理论加上表达就能过。</li></ul><h3>报考(初级)</h3><ul><li>年满16周岁 / 初中及以上 / 身体健康 / 无需工作经验</li></ul><div class="wrn">具体形式以当年官方通知为准,政策可能微调。</div><div class="tip">心态:不是高考,60分过线拿证即可。一章一章来,放轻松。</div>'}
],

{id:"ch2",num:"Chapter 2",title:"运动解剖学",desc:"认识身体零件:骨骼、关节、肌肉。看动作就知道练哪、怎么发力、怎么不受伤。",diff:2,st:"new",
secs:[
{id:"ch2s1",title:"2.1 别急着背,先建一张身体地图",c:'<h2>2.1 别急着背 — 先建一张身体地图</h2><p>很多人一看解剖就慌:一堆骨头名、肌肉名、还有拉丁文。<b>放心,你不用背那些。</b></p><h3>PT 需要的解剖是"功能级"的</h3><p>你不用当医生,只需要能回答三件事:</p><ul><li>这个动作,<b>哪块肌肉</b>在干活?</li><li>它连着<b>哪个关节</b>、往哪个方向拉?</li><li>哪里容易<b>代偿/受伤</b>?</li></ul><p>能答这三个,你就能给会员纠动作、排计划、防受伤 — 这就够了。拉丁名、每块肌肉的起止点,考纲要的那几个我会单独标,其余一律不背。</p><h3>怎么学最省力</h3><p><b>挂靠你已经会的动作</b>,别孤立背图。学到"背阔肌"就想引体向上,学到"臀大肌"就想深蹲站起来那下。把名字贴到你身体已有的感觉上,记得又快又牢。</p><div class="tip">联系你自己:你练了一年多,这些骨头肌肉你每天都在用,只是没给它们"贴标签"。这一章就是带你贴标签 — 不是从零背书。</div>'},
{id:"ch2s2",title:"2.2 骨骼与关节:身体的杠杆和铰链",c:'<h2>2.2 骨骼与关节 — 杠杆和铰链</h2><h3>骨骼干三件事</h3><ul><li><b>支撑</b>身体、<b>保护</b>内脏(肋骨护心肺、颅骨护脑)</li><li>当<b>杠杆</b> — 肌肉拉骨头,才产生动作。这点最重要:<b>动作 = 肌肉拉动骨头绕关节转</b>。</li></ul><p>全身 206 块骨头<b>不用背</b>。记大区块就行:脊柱(颈-胸-腰-<ruby>骶<rt>dǐ</rt></ruby>)、上肢带(肩胛+手臂)、下肢带(骨盆+腿)。</p><h3>关节 = 会动的连接,按"能往哪动"记</h3><table><tr style="background:var(--ac);color:#fff"><th>类型</th><th>代表</th><th>特点</th></tr><tr><td><b>球窝关节</b></td><td>肩、<ruby>髋<rt>kuān</rt></ruby></td><td>能转圈,活动度最大 — 但也<b>最不稳、最易伤</b></td></tr><tr><td><b>铰链关节</b></td><td>肘、膝</td><td>像门轴,主要只能屈伸</td></tr><tr><td><b>脊柱(一串小关节)</b></td><td>颈/胸/腰</td><td>能前后弯、侧弯、旋转;但<b>腰椎旋转能力很弱</b></td></tr></table><h3>为什么这跟受伤有关</h3><p>膝盖是铰链,你却让它内扣旋转(深蹲膝盖内夹)→ 疼。腰椎不擅长旋转,你却弯腰转身搬重物 → 闪腰。<b>受伤,常常是让"不该转的关节去转"。</b></p><div class="wrn">硬拉腰疼的解剖原因:该由髋关节(球窝,能大幅折叠)主导折叠,却塌腰用腰椎去代偿。懂关节分工,就懂怎么不受伤。</div>'},
{id:"ch2s3",title:"2.3 肌肉怎么发力:向心/离心/等长",c:'<h2>2.3 肌肉怎么发力</h2><p><b>关键认知:肌肉只能"拉",不能"推"。</b>它靠收缩产生拉力,拉动骨头。你以为在"推"杠铃,其实是胸和三头在"拉"骨头完成推的动作。</p><h3>三种收缩(必考,也超实用)</h3><ul><li><b>向心收缩</b> — 肌肉<b>缩短</b>发力 = <b>举起来</b>那下(卧推推上去、深蹲站起来、弯举卷上来)。</li><li><b>离心收缩</b> — 肌肉<b>拉长</b>但仍在控制 = <b>放下去</b>那下(慢慢下放)。离心是<b>增肌刺激和肌肉酸痛(DOMS,全称 Delayed Onset Muscle Soreness,即延迟性肌肉酸痛)的大功臣</b>。</li><li><b>等长收缩</b> — 长度<b>不变</b>发力 = 平板支撑、静态靠墙蹲、拎重物站着不动。</li></ul><h3>一块肌肉动作里的"角色"</h3><p>拿弯举举例:</p><ul><li><b>主动肌</b>:发力的主角 = <ruby>肱<rt>gōng</rt></ruby>二头肌</li><li><b><ruby>拮<rt>jié</rt></ruby>抗肌</b>:对面放松配合的 = 肱三头肌</li><li><b>协同肌/稳定肌</b>:帮忙和固定姿势的 = 前臂、肩部肌群</li></ul><div class="tip">联系你自己:练完第二天酸(DOMS)主要来自<b>离心</b>。想加强刺激 → 放慢下放(离心);怕酸到影响生活 → 别一次堆太多离心量。这就是"控制离心"这个训练技巧的原理。</div>'},
{id:"ch2s4",title:"2.4 上半身肌肉(配你练的动作)",c:'<h2>2.4 上半身肌肉</h2><p>每块肌肉后面直接配"你练它的动作",看动作记名字。</p><table><tr style="background:var(--ac);color:#fff"><th>部位</th><th>肌肉(通俗)</th><th>代表动作</th></tr><tr><td>胸</td><td>胸大肌</td><td>卧推、俯卧撑、飞鸟夹胸</td></tr><tr><td>背(宽度)</td><td>背阔肌</td><td>引体向上、高位下拉</td></tr><tr><td>背(厚度)</td><td>斜方肌、菱形肌</td><td>划船、耸肩</td></tr><tr><td>肩</td><td>三角肌(前/中/后三束)</td><td>推举练前中、侧平举练中、反向飞鸟练后</td></tr><tr><td>大臂前</td><td><ruby>肱<rt>gōng</rt></ruby>二头肌</td><td>弯举</td></tr><tr><td>大臂后</td><td>肱三头肌</td><td>臂屈伸、窄距卧推</td></tr></table><h3>两个实用点</h3><ul><li><b>三头比二头大</b>:肱三头肌约占大臂 2/3。想胳膊粗,练三头比练二头更划算。</li><li><b>肩分三束</b>:很多人只练到前束(推得多),中后束弱 → 圆肩。要练全三个方向。</li></ul><div class="tip">联系你自己:你说过胸肌、背阔隔着衣服都能看出来 — 那两块就是<b>胸大肌 + 背阔肌</b>。你早就"认识"它们了,现在只是给它们配上名字和对应动作。</div>'},
{id:"ch2s5",title:"2.5 下半身与核心:力量的发动机",c:'<h2>2.5 下半身与核心</h2><p>下肢和核心是<b>全身力量的发动机</b>,也是新手最该重视、最容易忽视的地方。</p><table><tr style="background:var(--ac);color:#fff"><th>部位</th><th>肌肉</th><th>代表动作</th></tr><tr><td>臀</td><td>臀大肌(<b>最强的<ruby>髋<rt>kuān</rt></ruby>伸肌</b>)</td><td>深蹲、硬拉、臀桥</td></tr><tr><td>大腿前</td><td>股四头肌</td><td>深蹲、腿屈伸</td></tr><tr><td>大腿后</td><td><ruby>腘<rt>guó</rt></ruby>绳肌</td><td>硬拉、腿弯举</td></tr><tr><td>小腿</td><td><ruby>腓<rt>féi</rt></ruby>肠肌、比目鱼肌</td><td>提踵</td></tr></table><h3>核心 ≠ 六块腹肌</h3><p>这是最重要的纠正。核心是一圈肌肉:</p><ul><li><b>腹直肌</b> — 就是"六块腹肌",负责躯干前屈</li><li><b>腹横肌</b> — 像束腰带,<b>收紧稳定脊柱</b>(发力前"绷紧核心"就是它)</li><li><b>竖脊肌</b> — 背后一长条,让你挺直腰背</li></ul><p><b>核心真正的作用是:稳定脊柱、传递力量。</b>不是为了看起来有腹肌。</p><div class="wrn">联系你自己:深蹲、硬拉重量上不去,很多时候<b>不是腿不够力,是核心稳不住(中途泄力)</b>。核心是"力量的中转站" — 腿产生的力要经过稳定的核心才能传出去。腘绳肌太弱也易拉伤、影响膝盖稳定。</div>'},
{id:"ch2s6",title:"2.6 把解剖用起来:看动作猜肌肉",c:'<h2>2.6 把解剖用起来 — 看动作猜肌肉</h2><p>这是全章最值钱的能力,也是<b>考试实操 + 以后带会员</b>都要用的。</p><h3>拿到任何动作,问三个问题</h3><ol><li><b>哪个关节在动?</b>往哪个方向?</li><li>那么<b>哪块肌肉</b>负责这个方向?</li><li>现在是<b>向心(发力举起)还是离心(控制放下)</b>?</li></ol><h3>三个例子串起来</h3><ul><li><b>深蹲</b>:下蹲=<ruby>髋<rt>kuān</rt></ruby>膝屈,臀+股四头<b>离心</b>控制;站起=同肌群<b>向心</b>发力。</li><li><b>卧推</b>:推起=肩水平内收+肘伸,胸大肌+<ruby>肱<rt>gōng</rt></ruby>三头<b>向心</b>。</li><li><b>引体向上</b>:拉起=肩内收+肘屈,背阔肌+肱二头<b>向心</b>。</li></ul><h3>复合动作 vs 孤立动作</h3><ul><li><b>复合(多关节)</b>:深蹲、硬拉、卧推、引体 — 参与肌肉多,长力量、性价比高,新手主菜。</li><li><b>孤立(单关节)</b>:弯举、腿屈伸、侧平举 — 精修某块肌肉,雕细节。</li></ul><div class="tip">学到这,你已经能看着一个动作说出"练哪、怎么发力"了。这就是从"跟着练"到"懂着练"的分界线 — 也是你比很多只会数组数的同行强的地方。</div>'}
],
fcs:[{f:"肌肉发力只能做什么?",b:"收缩(拉),不能推;所谓推是靠拉骨头完成"},{f:"向心收缩 = ?",b:"肌肉缩短发力 = 举起来那下"},{f:"离心收缩 = ?",b:"肌肉拉长但控制 = 放下去那下;酸痛(DOMS)主因"},{f:"等长收缩 = ?",b:"长度不变发力 = 平板支撑/靠墙蹲"},{f:"球窝关节代表+特点?",b:"肩、髋;活动度最大,也最不稳最易伤"},{f:"铰链关节代表?",b:"肘、膝;像门轴,主要只能屈伸"},{f:"背阔肌练什么动作?",b:"引体向上、高位下拉(背的宽度)"},{f:"最强的髋伸肌?",b:"臀大肌(深蹲/硬拉/臀桥)"},{f:"腘绳肌位置+动作?",b:"大腿后侧;硬拉、腿弯举"},{f:"核心真正作用?",b:"稳定脊柱、传递力量 — 不只是练六块腹肌"},{f:"弯举:主动肌 vs 拮抗肌?",b:"肱二头肌(主动) / 肱三头肌(拮抗)"},{f:"复合动作 = ?",b:"多关节参与:深蹲/硬拉/卧推/引体"}],

{id:"ch3",num:"Chapter 3",title:"运动生理学",desc:"为什么这样练?能量、心肺、肌肉生长的底层逻辑,把你练出来的体感配上原理。",diff:3,st:"new",
secs:[
{id:"ch3s1",title:"3.1 别怕生理学三个字",c:'<h2>3.1 别怕"生理学"三个字</h2><p>一看"生理学"就头大?<b>别慌。</b>它不是让你背公式,是搞懂一件事:<b>你练的时候,身体里到底发生了啥。</b></p><h3>你其实早就体验过了</h3><p>你练了一年多,下面这些身体感受,全是生理学的活教材:</p><ul><li>为什么冲刺几十秒就累瘫,慢跑却能撑半小时?</li><li>为什么练完要休息,肌肉才会长?</li><li>为什么心率高低能反映累不累?</li></ul><p>这一章就是把你已有的这些感受,配上背后的原理。<b>先有体感,再懂道理,记得最牢。</b></p><div class="tip">联系你自己:每一次力竭、每一次第二天酸、每一次喘不上气,都是身体在给你上生理课。</div>'},
{id:"ch3s2",title:"3.2 能量从哪来:三大供能系统",c:'<h2>3.2 能量从哪来 — 三大供能系统</h2><p>身体发力要烧"油",油箱有三个,按<b>出油快慢</b>分工:</p><table><tr style="background:var(--ac);color:#fff"><th>系统</th><th>撑多久</th><th>用在哪</th></tr><tr><td><b>磷酸原(ATP-CP)</b></td><td>约10秒</td><td>1RM大重量、短冲刺 — 最猛最快</td></tr><tr><td><b>糖<ruby>酵<rt>jiào</rt></ruby>解</b></td><td>10秒-2分钟</td><td>练到又酸又胀的8-15次组,那股"烧灼感"就是它</td></tr><tr><td><b>有氧</b></td><td>几分钟以上</td><td>慢跑、骑行、动感单车 — 最慢最持久</td></tr></table><p>挂靠你的训练:深蹲做5次很猛、一组就喘=磷酸原+糖酵解;骑RPM 45分钟=有氧全程供能。</p><div class="wrn">别被误导:三个系统从不单独工作,永远是混合供能,只是主次不同。所以"必须慢练才减脂"是错的 — 减脂看总消耗,不看某个心率区间。</div>'},
{id:"ch3s3",title:"3.3 力量/耐力/爆发力练的不同",c:'<h2>3.3 力量、耐力、爆发力 — 练的是不同能力</h2><p>同样是撸铁,练法不同,练出来的能力完全不同。这直接决定你给会员<b>排几次几组</b>:</p><ul><li><b>最大力量</b>(能举多重)→ 大重量、低次数 <b>1-6RM</b></li><li><b>肌肥大</b>(肌肉变粗)→ 中等重量、中次数 <b>6-12RM</b> + 足够总量</li><li><b>肌耐力</b>(能重复多久)→ 轻重量、高次数 <b>15次以上</b></li><li><b>爆发力</b>(发力多快)→ 快速动作,跳、爆发上拉</li></ul><p>RM = 你这个重量最多能标准做几次。8RM就是做到第8次刚好力竭的重量。</p><div class="tip">联系你自己:会员想"变壮"给他8-12次,想"变有力"给他3-5次,想"练线条耐力"给他15次以上 — 这就是按目标配次数的底层逻辑。</div>'},
{id:"ch3s4",title:"3.4 肌肉是怎么长大的",c:'<h2>3.4 肌肉是怎么长大的</h2><p>肌肉不会无缘无故变粗,它需要一个<b>刺激 → 恢复 → 变强</b>的循环。</p><h3>三个生长刺激</h3><ul><li><b>机械张力</b> — 举得够重(最重要)</li><li><b>代谢压力</b> — 练到泵感、酸胀</li><li><b>肌肉微损伤</b> — 轻微撕裂后被修复</li></ul><h3>关键词:超量恢复</h3><p>训练=<b>破坏</b>肌肉 → 休息+吃够=<b>修复</b> → 修复后比原来强一点点。这多出来的一点,就是你变强的来源。</p><p>所以:不休息不长、不吃够不长、永远用同样重量也不长(要一点点加重,叫"渐进超负荷")。</p><div class="wrn">记住这句:肌肉不是在健身房长的,是在你睡觉和吃饭时长的。练只是"下订单",吃和睡才是"生产车间"。</div>'},
{id:"ch3s5",title:"3.5 心肺:摄氧量与心率",c:'<h2>3.5 心肺系统 — 你的氧气运输链</h2><p>心肺干的活很简单:<b>把氧气送到肌肉</b>。肺吸氧 → 心脏泵血 → 血液把氧运到肌肉发力。</p><h3>两个关键词</h3><ul><li><b>最大摄氧量(VO2max)</b> — 你有氧能力的天花板,越高越耐造、越不容易喘。</li><li><b>心率</b> — 强度的仪表盘。估算最大心率 ≈ <b>220 减去年龄</b>,不同心率区间练不同能力。</li></ul><p>挂靠你的训练:骑车或RPM时,同样强度你越来越不喘 = 心肺在进步(心脏每次泵的血更多、静息心率下降)。</p><div class="tip">免费的心肺体检:早上刚醒别动,测一分钟脉搏。长期<b>静息心率下降</b>,说明你的心肺变强了。</div>'},
{id:"ch3s6",title:"3.6 疲劳与恢复:别练废",c:'<h2>3.6 疲劳与恢复 — 别把自己练废</h2><p>练得狠不等于练得好。<b>身体是被练出破坏、靠恢复变强的</b>,恢复跟不上,练再多都白费。</p><h3>过度训练的报警信号</h3><ul><li>静息心率莫名升高</li><li>睡不好、总没状态</li><li>成绩不升反降、老是受伤</li><li>情绪差、不想练</li></ul><h3>恢复三件套</h3><p><b>睡眠(最重要)</b> &gt; 营养 &gt; 主动恢复(轻活动、拉伸)。DOMS(延迟性酸痛,见第2章)是正常适应,<b>不是练得好的KPI,也不是每次都必须有</b>。</p><div class="wrn">新手最大误区:"练得越狠越好"。恢复不够还硬加量,等于往漏水的桶里拼命倒水。</div>'}
],

{id:"ch4",num:"Chapter 4",title:"营养学基础",desc:"三分练七分吃。帮会员管住嘴、吃对,是PT最实用的一块能力。",diff:2,st:"new",
secs:[
{id:"ch4s1",title:"4.1 别把营养学想复杂",c:'<h2>4.1 别把营养学想复杂</h2><p>营养学的水很深,但<b>PT要用的就一小撮</b>。你不用当营养师,你的任务是帮会员<b>管住嘴、吃对</b>。</p><p>记住一句扎心的话:<b>身材是"三分练七分吃"</b>。会员练得再狠,吃不对也白搭。</p><h3>三个问题能答就够</h3><ul><li>吃<b>多少</b>?(总热量)</li><li>吃<b>什么比例</b>?(三大营养素)</li><li><b>什么时候</b>吃?(时机)</li></ul><div class="tip">联系你自己:回想你增肌或减脂那段时间对饮食的体感,那就是你教会员时最真实的教材。</div>'},
{id:"ch4s2",title:"4.2 三大营养素",c:'<h2>4.2 三大营养素 — 身体的三种原料</h2><table><tr style="background:var(--ac);color:#fff"><th>营养素</th><th>作用</th><th>每克热量</th></tr><tr><td><b>蛋白质</b></td><td>盖房子的砖 — 修复、长肌肉</td><td>4 大卡</td></tr><tr><td><b>碳水</b></td><td>身体首选燃料 — 给训练力气</td><td>4 大卡</td></tr><tr><td><b>脂肪</b></td><td>备用能量 + 造激素</td><td>9 大卡(最高)</td></tr></table><p>挂靠你的训练:练完想补蛋白长肌肉、练前吃点碳水才有劲、脂肪吃多了容易囤 — 这就是三者分工。</p><div class="wrn">没有"坏"的营养素,只有比例和总量的问题。极端戒碳水、戒脂肪,既不健康也坚持不了。</div>'},
{id:"ch4s3",title:"4.3 能量平衡:增肌减脂唯一底层",c:'<h2>4.3 能量平衡 — 增肌减脂的唯一底层</h2><p>不管什么减肥法、增肌法,底层就一条铁律:</p><ul><li>吃进来 <b>多于</b> 消耗 = <b>增重</b>(热量盈余)</li><li>吃进来 <b>少于</b> 消耗 = <b>减重</b>(热量赤字)</li></ul><p><b>减脂的本质就是热量赤字</b>,没有任何食物能绕过这条。所谓"燃脂食物""排毒果汁"基本是营销话术。</p><p>增肌则要<b>小幅盈余</b> + 好好练 + 蛋白吃够,才长肌肉而不是纯长肥。</p><div class="wrn">"我喝水都胖"几乎不存在。真相通常是:严重低估了自己吃进去的量。让会员如实记录一周饮食,往往当场破案。</div>'},
{id:"ch4s4",title:"4.4 蛋白质:增肌重中之重",c:'<h2>4.4 蛋白质 — 增肌的重中之重</h2><p>蛋白质是长肌肉的砖头。<b>增肌要吃够,减脂更要吃够</b>(减脂时保住肌肉,别把肌肉也减没了)。</p><h3>吃多少</h3><p>健身人群参考:<b>每公斤体重约 1.6 到 2.2 克</b>。70公斤的人大概每天 120 到 150 克。</p><h3>从哪吃</h3><p>鸡胸、鸡蛋、瘦牛肉、鱼虾、奶制品、豆制品都是优质来源。一顿手掌大小的肉才约 20 到 30 克蛋白,所以要<b>分几餐凑够</b>,不够就用蛋白粉补。</p><div class="tip">蛋白粉不是药,就是一种方便的蛋白来源 — 帮你把当天的蛋白量凑齐,如此而已。</div>'},
{id:"ch4s5",title:"4.5 碳水与脂肪:被冤枉的两兄弟",c:'<h2>4.5 碳水与脂肪 — 被冤枉的两兄弟</h2><h3>碳水:训练的汽油</h3><p>戒了碳水就<b>没劲、掉状态</b>。选"慢碳"为主(米饭、燕麦、薯类、全麦),精制糖和含糖饮料少碰。</p><h3>脂肪:造激素的原料</h3><p>脂肪是造<ruby>睾<rt>gāo</rt></ruby>酮等激素的必需原料,戒太狠会影响状态和情绪。选好脂肪(坚果、深海鱼、橄榄油),油炸和反式脂肪少吃。</p><p>减脂时的正确姿势:<b>压碳水和脂肪的总量、保住蛋白</b>,而不是把某一类归零。</p><div class="wrn">"生酮""戒碳水"能短期掉秤(掉的多是水和糖原),但对普通健身人群没必要也难坚持,别盲目跟风。</div>'},
{id:"ch4s6",title:"4.6 时机、水和补剂",c:'<h2>4.6 时机、水和补剂</h2><h3>吃的时机</h3><ul><li><b>练前</b>:吃点碳水加蛋白,有劲又不难受(别吃太饱)。</li><li><b>练后</b>:补蛋白加碳水帮修复。所谓"窗口期"没那么神,<b>当天总量吃够更重要</b>。</li></ul><h3>水</h3><p>脱水会直接掉力气和状态,训练日一定多喝水。</p><h3>补剂优先级</h3><p>蛋白粉(方便) &gt; 肌酸(<b>最有科学证据、且安全</b>的增肌增力补剂) &gt; 其余大多是智商税。</p><div class="tip">补剂是锦上添花。先把吃饭、睡觉、好好训练这三件事搞定,再谈要不要买补剂。</div>'}
],

{id:"ch5",num:"Chapter 5",title:"健康与体适能评估",desc:"开练前先摸底:排风险、定基线。这也是你赢得会员信任的第一步。",diff:2,st:"new",
secs:[
{id:"ch5s1",title:"5.1 为什么先评估再训练",c:'<h2>5.1 为什么先评估再训练</h2><p>"评估"听着专业,其实就是<b>开练前先摸个底</b>。目的只有两个:</p><ul><li><b>防受伤</b> — 别让有健康风险的人乱练出事。</li><li><b>定基线</b> — 有起点,才能看到会员的进步。</li></ul><p>不评估直接练,等于<b>蒙眼开车</b>。</p><div class="tip">联系你自己:你健身也是先知道自己能蹲多重、体重多少,才知道往哪练。给会员是同一个道理。而且会员看你认真测,才信你专业 — 评估是建立信任的第一步。</div>'},
{id:"ch5s2",title:"5.2 健康筛查:先排除风险",c:'<h2>5.2 健康筛查 — 先排除风险</h2><p>开练前先问一轮健康问题(行业叫 PAR-Q 问卷):有没有心脏病、胸痛、头晕、关节问题、正在吃什么药。</p><h3>风险分层</h3><ul><li><b>低危</b>(健康、年轻)→ 可以直接开练。</li><li><b>中高危</b>(有慢病、有症状、年纪大)→ 建议先就医评估再练。</li></ul><h3>红旗信号(立刻停 + 建议就医)</h3><p>运动中出现<b>胸痛、异常气短、头晕或晕<ruby>厥<rt>jué</rt></ruby></b>。</p><div class="wrn">教练不是医生。会员有明显健康风险,先让他去医院,别逞能硬带 — 出事是大事。</div>'},
{id:"ch5s3",title:"5.3 身体成分:比体重更重要",c:'<h2>5.3 身体成分 — 比体重更重要</h2><p>体重不等于胖瘦,<b>肌肉比脂肪重</b>。看这几个更靠谱:</p><table><tr style="background:var(--ac);color:#fff"><th>指标</th><th>怎么看</th></tr><tr><td><b>BMI</b></td><td>体重÷身高的平方,粗筛用;肌肉多的人会被<b>误判为超重</b></td></tr><tr><td><b>体脂率</b></td><td>更准。参考:男 15-20%、女 20-25% 算健康区间</td></tr><tr><td><b>腰围</b></td><td>内脏脂肪风险指标,男≥90cm、女≥85cm 要警惕</td></tr></table><div class="tip">联系你自己:你 BMI 超标,但长的其实是肌肉 — 这正是"不能只看体重秤"的活例子。教会员时可以直接拿这个讲。</div>'},
{id:"ch5s4",title:"5.4 心肺评估",c:'<h2>5.4 心肺评估</h2><p>目的:摸清会员的有氧底子,好定训练强度。常用几招:</p><ul><li><b>静息心率</b> — 早上刚醒别动,测一分钟脉搏,越低通常心肺越好。</li><li><b>台阶测试 / 2分钟原地踏步</b> — 看运动后心率恢复得快不快。</li><li><b>估算最大心率</b> — 约 220 减年龄,据此划训练心率区间。</li></ul><div class="tip">给新手会员,简单的踏步测试加聊聊运动习惯就够定基线了,别一上来就搞复杂设备,反而吓跑人。</div>'},
{id:"ch5s5",title:"5.5 力量与耐力评估",c:'<h2>5.5 力量与耐力评估</h2><h3>力量</h3><p>最直接是 1RM(能举的最大重量),但<b>新手别硬测 1RM</b> — 动作不稳、极限重量下很容易受伤。更安全的做法:用轻中重量做几次,反推估算。</p><h3>肌耐力</h3><p>简单实用:<b>俯卧撑最多做几个、平板支撑能撑多久</b>。</p><p>挂靠你自己:这些测试你都做过,给会员就是同一套,先看动作质量再谈重量。</p><div class="wrn">新手直接冲 1RM 风险很高。先用轻重量把动作练标准,再一点点加 — 安全永远排第一。</div>'},
{id:"ch5s6",title:"5.6 柔韧与体态",c:'<h2>5.6 柔韧与体态</h2><h3>柔韧</h3><p>坐位体前屈(坐着往前够,看能摸多远)是最常用的柔韧测试。</p><h3>现代人三大常见体态问题</h3><ul><li><b>圆肩驼背</b> — 久坐、低头玩手机的通病。</li><li><b>骨盆前倾</b> — 小肚子前顶、腰部发空。</li><li><b>头前引</b>(乌龟脖) — 头往前探。</li></ul><p>这些<b>不是病</b>,是能通过针对性训练加拉伸改善的。</p><div class="tip">会员一进门,你就能"看"出他的体态问题,当场指出来加给改善方向 — 专业感立刻拉满,信任也就来了。</div>'}
],

{id:"ch6",num:"Chapter 6",title:"运动计划制定",desc:"选动作、定强度、排周期、做渐进。这是PT最值钱、最难被替代的能力。",diff:3,st:"new",
secs:[
{id:"ch6s1",title:"6.1 从评估到计划:先问要什么",c:'<h2>6.1 从评估到计划 — 先问客户要什么</h2><p>排计划听着最难,其实就是回答三件事:<b>给谁练、练什么、怎么练</b>。有个万能框架叫 <b>FITT</b>:</p><ul><li><b>F</b>requency 频率 — 一周练几次</li><li><b>I</b>ntensity 强度 — 用多重、多累</li><li><b>T</b>ime 时长 — 每次练多久</li><li><b>T</b>ype 类型 — 练什么(力量/有氧/柔韧)</li></ul><p>先搞清会员的<b>目标</b>(增肌/减脂/健康/康复)和<b>现状</b>(评估结果、时间、场地),再套 FITT。</p><div class="tip">好教练不是会的动作最多,而是最会"按人定制"的。同样几个动作,给不同的人,排法可以完全不同。</div>'},
{id:"ch6s2",title:"6.2 选动作:复合优先",c:'<h2>6.2 选动作 — 复合优先</h2><ul><li><b>复合动作</b>(多关节):深蹲、硬拉、卧推、划船、推举、引体 — 练得肌肉多、性价比高,<b>优先排</b>。</li><li><b>孤立动作</b>(单关节):弯举、飞鸟、腿屈伸 — 补短板、雕细节,<b>放后面</b>。</li></ul><h3>动作要平衡</h3><p>推和拉要配对(别只练胸不练背),上肢下肢都要练,别偏科。</p><div class="wrn">联系你自己:你的训练也是复合打底、孤立收尾。给会员一个道理 — 时间有限时,先保住复合动作。</div>'},
{id:"ch6s3",title:"6.3 定强度与容量",c:'<h2>6.3 定强度与容量</h2><p><b>强度</b>=用多重(常用 RM 或 1RM 百分比);<b>容量</b>=练多少(组数×次数×重量)。</p><h3>更实用的工具:RPE</h3><p>新手不方便测 1RM,用 <b>RPE(自觉用力度)</b> 更好使:<b>RPE 8 大约等于"还剩 2 次到力竭"</b>。让会员练到 RPE 7-8,既有效又安全。</p><h3>常用搭配</h3><ul><li>增肌:8-12 次 × 3-4 组</li><li>力量:3-6 次 × 多组</li><li>耐力:15 次以上</li></ul><div class="wrn">容量不是越多越好。超过恢复能力就是过度训练 — 宁可少而精。</div>'},
{id:"ch6s4",title:"6.4 渐进超负荷:计划的灵魂",c:'<h2>6.4 渐进超负荷 — 计划的灵魂</h2><p>身体会适应。<b>一成不变,就不再进步。</b>所以要让负荷一点点往上加。</p><h3>加负荷的几种方式</h3><ul><li>加重量</li><li>加次数</li><li>加组数</li><li>缩短组间休息</li><li>改进动作质量(做得更标准更深)</li></ul><p>原则:<b>循序渐进,一次只动一个变量,小步加。</b></p><div class="tip">联系你自己:当你发现"上个月的重量现在做起来轻松了",就是该加的信号。会员不进步,八成就是没有持续渐进。渐进超负荷是训练进步的根本,没有之一。</div>'},
{id:"ch6s5",title:"6.5 周期化与休息",c:'<h2>6.5 周期化与休息</h2><p>别一直顶着最大强度练,身体扛不住,迟早撞平台或受伤。</p><h3>简单的周期思路</h3><ul><li>强度和容量安排<b>起伏</b>:有重周,也有轻周。</li><li>隔一阵安排一个<b>减载周(deload)</b>:主动降量,让身体缓过来。</li><li>大肌群两次训练之间,<b>至少隔 48 小时</b>。</li></ul><div class="wrn">计划里的"休息"和"练"一样重要。不安排恢复和减载,进步迟早停,伤病迟早来。</div>'},
{id:"ch6s6",title:"6.6 一份新手计划长什么样",c:'<h2>6.6 一份新手计划长什么样</h2><p>举个例子:<b>新手,目标增肌+健康,一周 3 练,全身循环</b>。</p><h3>每次练什么</h3><ul><li>下肢:深蹲 或 硬拉类</li><li>推:卧推 或 推举</li><li>拉:划船 或 引体</li><li>核心:平板支撑等</li></ul><p>每个动作 <b>3 组 × 8-12 次</b>,重量以最后 2 次有点吃力为准(RPE 8);每次比上次<b>尝试加一点点</b>(渐进超负荷)。</p><div class="tip">为什么新手用全身 3 练:动作练的频率高、学得快、恢复也够。别急着上花哨的分化训练 — 把基础复合动作练好,进步最快。</div>'}
],

secs:[
{id:"ch7s1",title:"7.1 预防永远大于治疗",c:'<h2>7.1 预防永远大于治疗</h2><p>这一章不是让你当医生,是让你会两件事:<b>尽量别让会员受伤</b>,以及<b>真出事了会正确处理、并知道自己的边界在哪</b>。</p><h3>健身伤大多是可预防的</h3><p>常见诱因就那几个:热身不足、动作错误、加重太快、恢复不够、逞强硬上。避开这些,大部分伤就没了。</p><div class="tip">联系你自己:你练这么久,多半也经历过小拉伤或关节不适,回想它们多是怎么来的 — 基本都躲得掉。一个从不让会员受伤的教练,口碑比什么都硬。</div>'},
{id:"ch7s2",title:"7.2 常见健身损伤",c:'<h2>7.2 常见健身损伤</h2><ul><li><b>肌肉拉伤</b> — 突然发力或热身不够,肌肉被拉过头。</li><li><b>关节扭伤</b> — <ruby>踝<rt>huái</rt></ruby>、膝、腕常见,韧带被扭超出正常范围。</li><li><b>腰背损伤</b> — 硬拉或搬重物塌腰(第2章讲过:该由髋主导,却让腰椎代偿)。</li><li><b>肩部损伤</b> — 卧推推举姿势错、肩活动度不够。</li><li><b>肌<ruby>腱<rt>jiàn</rt></ruby>炎</b> — 反复过量导致劳损,比如网球肘。</li></ul><div class="wrn">出现急性剧痛、明显肿胀、关节变形、动不了 — 别硬扛,立刻停下处理或就医。</div>'},
{id:"ch7s3",title:"7.3 急性处理:PRICE原则",c:'<h2>7.3 急性处理 — PRICE 原则</h2><p>急性软组织损伤(拉伤、扭伤)的<b>48小时内</b>,记住 PRICE:</p><table><tr style="background:var(--ac);color:#fff"><th>字母</th><th>含义</th></tr><tr><td><b>P</b> Protection</td><td>保护,别再用伤处</td></tr><tr><td><b>R</b> Rest</td><td>休息</td></tr><tr><td><b>I</b> Ice</td><td>冰敷,减肿减痛</td></tr><tr><td><b>C</b> Compression</td><td>加压包扎</td></tr><tr><td><b>E</b> Elevation</td><td>抬高患处</td></tr></table><p>早期三不:<b>别热敷、别揉、别继续练</b>。</p><div class="tip">现在也有更新的 POLICE 原则(把纯休息换成"适度活动"),但 PRICE 最好记、日常够用。</div>'},
{id:"ch7s4",title:"7.4 什么时候必须转诊",c:'<h2>7.4 什么时候必须转诊</h2><p>教练能处理的是"小伤加预防",超出范围的<b>必须让会员去医院</b>。看到这些红旗,别犹豫:</p><ul><li>剧烈疼痛、明显肿胀或淤青</li><li>关节变形、无法承重或活动</li><li>头部受伤、意识异常</li><li>疑似骨折、脱<ruby>臼<rt>jiù</rt></ruby></li></ul><div class="wrn">拿不准,就转诊。硬扛耽误治疗,责任在你 — 让专业的人做专业的事。</div>'},
{id:"ch7s5",title:"7.5 教练的法律与职业边界",c:'<h2>7.5 教练的法律与职业边界</h2><p>这条超重要,踩线可能担责:</p><ul><li><b>不能诊断疾病、不能开药或开处方</b> — 那是医生的事。</li><li>不能超出资质范围(没康复资质,就别做康复治疗)。</li><li>训练前让会员<b>签知情同意书</b>,告知运动风险。</li><li>建议购买<b>职业责任险</b>,万一出事有保障。</li><li>保护会员隐私。</li></ul><div class="wrn">越界去诊断、开方,一旦出事可能承担法律责任。守住一句话:<b>我是教练,不是医生。</b>这也是在保护你自己。</div>'},
{id:"ch7s6",title:"7.6 场地器械安全与应急",c:'<h2>7.6 场地器械安全与应急</h2><h3>日常安全</h3><ul><li>器械定期检查、地面防滑、通道畅通。</li><li>大重量训练一定安排<b>保护者(spotter)</b>。</li></ul><h3>应急预案</h3><ul><li>知道 <b>AED(自动体外除<ruby>颤<rt>chàn</rt></ruby>器)</b> 放在哪。</li><li>会基础<b>心肺复苏(CPR)</b>。</li><li>紧急联系方式贴在显眼处。</li></ul><p>心脏骤<ruby>骤<rt>zhòu</rt></ruby>停有"黄金4分钟",CPR 加 AED 能救命。</p><div class="tip">入职先搞清健身房的急救设备位置和应急流程。真出事时,你的镇定和正确处理,就是会员的命。</div>'}
],

var SK="koujin_v1";
function ld(){try{return JSON.parse(localStorage.getItem(SK))||{}}catch(e){return{}}}
function sv(s){localStorage.setItem(SK,JSON.stringify(s));cloudPushDebounced()}
/* ===== 云同步(固定云端存储,任何设备打开自动同步,无需任何操作)===== */
var CLOUD="https://jsonblob.com/api/jsonBlob/019f8e41-8987-7326-8745-b63e9cfdea92";
function snap(){return {read:S.read,quiz:S.quiz,wrong:S.wrong,streak:S.streak,_mt:S._mt||Date.now()}}
function cloudPush(){S._mt=Date.now();localStorage.setItem(SK,JSON.stringify(S));fetch(CLOUD,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(snap())}).catch(function(){})}
var _pt=null;function cloudPushDebounced(){clearTimeout(_pt);_pt=setTimeout(cloudPush,2500)}
function cloudPull(cb){fetch(CLOUD,{headers:{"Accept":"application/json"}}).then(function(r){if(!r.ok)throw 0;return r.json()}).then(function(d){if(d&&typeof d==="object"&&(d._mt||0)>(S._mt||0)){S.read=d.read||{};S.quiz=d.quiz||{};S.wrong=d.wrong||[];S.streak=d.streak||{c:0,last:""};S._mt=d._mt||0;localStorage.setItem(SK,JSON.stringify(S));if(cb)cb(true)}else{if(Object.keys(S.read).length||S.wrong.length||S.streak.c||Object.keys(S.quiz).length)cloudPush();if(cb)cb(false)}}).catch(function(){if(cb)cb(false)})}
var S=ld();S.read=S.read||{};S.quiz=S.quiz||{};S.wrong=S.wrong||[];S.streak=S.streak||{c:0,last:""};
(function(){var td=new Date().toISOString().slice(0,10);if(S.streak.last===td)return;var yd=new Date(Date.now()-864e5).toISOString().slice(0,10);if(S.streak.last===yd){S.streak.c++;S.streak.last=td}else{S.streak.c=1;S.streak.last=td}sv(S)})();

  var ts=0,ds=0;CH.forEach(function(c){ts+=c.secs.length;c.secs.forEach(function(s){if(S.read[s.id])ds++})});
  var qd=Object.keys(S.quiz).length;

  }).join("");
  g.innerHTML+='<div class="cc" data-ch="wb" style="border-left:4px solid var(--err)"><div class="cn">工具</div><div class="ct">错题本</div><div class="cd">答错的题集中复习。</div><div class="cm"><span>'+S.wrong.length+' 道</span></div></div>';
}

// ===== TTS =====
var rates=[.8,1,1.2,1.5,2],ri=1;
function tPlay(){
  if(!window.speechSynthesis){alert("浏览器不支持语音");return}
  var sy=speechSynthesis;
  if(sy.paused){sy.resume();document.getElementById("tPl").textContent="\u23F8";return}
  if(sy.speaking){sy.pause();document.getElementById("tPl").textContent="\u25B6";return}
  var _sc=document.getElementById("sC").cloneNode(true);var _r=_sc.querySelectorAll("rt");for(var _i=0;_i<_r.length;_i++)_r[_i].parentNode.removeChild(_r[_i]);var txt=_sc.innerText||_sc.textContent;if(!txt)return;
  var u=new SpeechSynthesisUtterance(txt);u.lang="zh-CN";u.rate=rates[ri];
  u.onend=function(){document.getElementById("tPl").textContent="\u25B6";document.getElementById("tSts").textContent="完毕"};
  sy.speak(u);document.getElementById("tPl").textContent="\u23F8";document.getElementById("tSts").textContent="朗读中..."
}
function tStop(){speechSynthesis&&speechSynthesis.cancel();document.getElementById("tPl").textContent="\u25B6";document.getElementById("tSts").textContent="停止"}
document.getElementById("tBtn").onclick=function(){var b=document.getElementById("tBar");b.classList.toggle("show");if(b.classList.contains("show"))tPlay();else tStop()};
document.getElementById("tPl").onclick=tPlay;
document.getElementById("tSt").onclick=function(){tStop();document.getElementById("tBar").classList.remove("show")};
document.getElementById("tSp").onclick=function(){ri=(ri+1)%rates.length;document.querySelector(".tsp").textContent=rates[ri]+"x"};
document.getElementById("tNx").onclick=function(){tStop();if(curSec<curCh.secs.length-1){curSec++;rSec();setTimeout(tPlay,300)}};
document.getElementById("tPv").onclick=function(){tStop();if(curSec>0){curSec--;rSec();setTimeout(tPlay,300)}};

function rQs(){
  var b=document.getElementById("qB"),h="";

function grade(){
  var correct=0,total=curCh.quiz.length;
  curCh.quiz.forEach(function(q,i){
    var card=document.querySelector('.qc[data-qi="'+i+'"]');
    var inputs=card.querySelectorAll("input");
    var ua;if(q.t==="m"){ua=[];inputs.forEach(function(inp,oi){if(inp.checked)ua.push(oi)})}else{ua=-1;inputs.forEach(function(inp,oi){if(inp.checked)ua=oi})}
    var ok;if(q.t==="m"){ok=JSON.stringify(ua.sort())===JSON.stringify(q.a.slice().sort())}else{ok=ua===q.a}
    var labels=card.querySelectorAll("label");
    if(q.t==="m"){q.a.forEach(function(ai){labels[ai].classList.add("ok")});ua.forEach(function(ui){if(q.a.indexOf(ui)<0)labels[ui].classList.add("no")})}
    else{if(q.a>=0)labels[q.a].classList.add("ok");if(ua>=0&&ua!==q.a)labels[ua].classList.add("no")}
    card.querySelector(".qe").style.display="block";inputs.forEach(function(inp){inp.disabled=true});
    if(ok)correct++;else{var ex=S.wrong.find(function(w){return w.ci===curCh.id&&w.qi===i});if(!ex)S.wrong.push({ci:curCh.id,qi:i,q:q.q,o:q.o,a:q.a,t:q.t,e:q.e})}
  });sv(S);
  var p=Math.round(correct/total*100);var cm=p>=80?"很棒!基本掌握。":p>=60?"及格,部分需回顾。":"别急,回去重读再来。";
  document.getElementById("subQ").outerHTML='<div class="qres"><div class="qs">'+correct+'/'+total+'</div><p class="qcm">正确率'+p+'% - '+cm+'</p><button class="rbtn" id="retQ">重新答</button><button class="rbtn" style="background:var(--ac)" id="bkQ">返回章节</button></div>';
  document.getElementById("retQ").onclick=rQs;document.getElementById("bkQ").onclick=function(){show("vR")};
  S.quiz[curCh.id]={score:correct,total:total,pct:p,date:new Date().toISOString().slice(0,10)};sv(S);upd();
}
